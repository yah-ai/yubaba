version: '3'
services:
  api:
    image: ghcr.io/example/api:v1@sha256:abcdefabcdefabcdefabcdefabcdefabcdefabcdefabcdefabcdefabcdefabcd
    ports:
      - "3000"
    environment:
      DATABASE_URL: "postgres://db:5432/app"
      LOG_LEVEL: "debug"
    depends_on:
      - db
  db:
    image: postgres:15@sha256:1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef
    environment:
      - POSTGRES_PASSWORD=secret
    restart: always
